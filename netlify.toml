[build]
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# ── Retired shoot-type pages (facelift pivot, Phase 2A): 301 old niche URLs
#    into the new positioning. /#content = the Content offer card on the homepage.
#    Phase 2B will repoint these at the real offer pages.
[[redirects]]
  from = "/services"
  to   = "/#offers"
  status = 301
[[redirects]]
  from = "/sports"
  to   = "/#content"
  status = 301
[[redirects]]
  from = "/events"
  to   = "/#content"
  status = 301
[[redirects]]
  from = "/restaurants"
  to   = "/#content"
  status = 301
[[redirects]]
  from = "/weddings"
  to   = "/#content"
  status = 301
[[redirects]]
  from = "/portraits"
  to   = "/#content"
  status = 301

# ── Pretty-URL rewrites: serve moved /pages/*.html at clean root paths.
#    status 200 = rewrite (browser URL stays pretty; query strings auto-preserved).
[[redirects]]
  from = "/work"
  to   = "/pages/work.html"
  status = 200
[[redirects]]
  from = "/meet-the-team"
  to   = "/pages/meet-the-team.html"
  status = 200
[[redirects]]
  from = "/testimonials"
  to   = "/pages/testimonials.html"
  status = 200
[[redirects]]
  from = "/faq"
  to   = "/pages/faq.html"
  status = 200
[[redirects]]
  from = "/interested"
  to   = "/pages/interested.html"
  status = 200
[[redirects]]
  from = "/album"
  to   = "/pages/album.html"
  status = 200

# ── Legacy *.html URLs → clean URL (301). Query strings auto-carry.
#    Retired niche pages point straight at their final destination (no chains).
[[redirects]]
  from = "/services.html"
  to   = "/#offers"
  status = 301
[[redirects]]
  from = "/sports.html"
  to   = "/#content"
  status = 301
[[redirects]]
  from = "/events.html"
  to   = "/#content"
  status = 301
[[redirects]]
  from = "/restaurants.html"
  to   = "/#content"
  status = 301
[[redirects]]
  from = "/weddings.html"
  to   = "/#content"
  status = 301
[[redirects]]
  from = "/portraits.html"
  to   = "/#content"
  status = 301
[[redirects]]
  from = "/work.html"
  to   = "/work"
  status = 301
[[redirects]]
  from = "/meet-the-team.html"
  to   = "/meet-the-team"
  status = 301
[[redirects]]
  from = "/testimonials.html"
  to   = "/testimonials"
  status = 301
[[redirects]]
  from = "/faq.html"
  to   = "/faq"
  status = 301
[[redirects]]
  from = "/interested.html"
  to   = "/interested"
  status = 301

# ── Renamed album page: old event URLs → /album. ?localAlbum= auto-carries.
[[redirects]]
  from = "/event"
  to   = "/album"
  status = 301
[[redirects]]
  from = "/event.html"
  to   = "/album"
  status = 301

# ── Retired orphan (category.html deleted). Safety net for any stray links.
[[redirects]]
  from = "/category"
  to   = "/work"
  status = 301
[[redirects]]
  from = "/category.html"
  to   = "/work"
  status = 301
