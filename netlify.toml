[build]
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# ── Retired shoot-type pages (facelift pivot): 301 old niche URLs to the
#    Content offer page. /services → the homepage offer ladder.
[[redirects]]
  from = "/services"
  to   = "/#offers"
  status = 301
[[redirects]]
  from = "/sports"
  to   = "/content"
  status = 301
[[redirects]]
  from = "/events"
  to   = "/content"
  status = 301
[[redirects]]
  from = "/restaurants"
  to   = "/content"
  status = 301
[[redirects]]
  from = "/weddings"
  to   = "/content"
  status = 301
[[redirects]]
  from = "/portraits"
  to   = "/content"
  status = 301

# ── Pretty-URL rewrites: serve moved /pages/*.html at clean root paths.
#    status 200 = rewrite (browser URL stays pretty; query strings auto-preserved).
[[redirects]]
  from = "/websites"
  to   = "/pages/websites.html"
  status = 200
[[redirects]]
  from = "/branding-kits"
  to   = "/pages/branding-kits.html"
  status = 200
[[redirects]]
  from = "/launch-kits"
  to   = "/pages/launch-kits.html"
  status = 200
[[redirects]]
  from = "/content"
  to   = "/pages/content.html"
  status = 200
[[redirects]]
  from = "/work"
  to   = "/pages/work.html"
  status = 200

# ── Case-study pages (one dedicated page per example build).
[[redirects]]
  from = "/work/titan"
  to   = "/pages/work-titan.html"
  status = 200
[[redirects]]
  from = "/work/hissy-chick"
  to   = "/pages/work-hissy-chick.html"
  status = 200
[[redirects]]
  from = "/work/eot"
  to   = "/pages/work-eot.html"
  status = 200
[[redirects]]
  from = "/meet-the-team"
  to   = "/pages/meet-the-team.html"
  status = 200
[[redirects]]
  from = "/testimonials"
  to   = "/pages/testimonials.html"
  status = 200
[[redirects]]
  from = "/faq"
  to   = "/pages/faq.html"
  status = 200
[[redirects]]
  from = "/interested"
  to   = "/pages/interested.html"
  status = 200
[[redirects]]
