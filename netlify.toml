# ── Renamed album page: old event URLs → /album. ?localAlbum= auto-carries.
[[redirects]]
  from = "/event"
  to   = "/album"
  status = 301
[[redirects]]
  from = "/event.html"
  to   = "/album"
  status = 301

# ── Retired orphan (category.html deleted). Safety net for any stray links.
[[redirects]]
  from = "/category"
  to   = "/work"
  status = 301
[[redirects]]
  from = "/category.html"
  to   = "/work"
  status = 301
