[build]
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# ── Pretty-URL rewrites: serve moved /pages/*.html at clean root paths.
#    status 200 = rewrite (browser URL stays pretty; query strings auto-preserved).
[[redirects]]
  from = "/services"
  to   = "/pages/services.html"
  status = 200
[[redirects]]
  from = "/sports"
  to   = "/pages/sports.html"
  status = 200
[[redirects]]
  from = "/events"
  to   = "/pages/events.html"
  status = 200
[[redirects]]
  from = "/restaurants"
  to   = "/pages/restaurants.html"
  status = 200
[[redirects]]
  from = "/weddings"
  to   = "/pages/weddings.html"
  status = 200
[[redirects]]
  from = "/portraits"
  to   = "/pages/portraits.html"
  status = 200
[[redirects]]
  from = "/work"
  to   = "/pages/work.html"
  status = 200
[[redirects]]
  from = "/meet-the-team"
  to   = "/pages/meet-the-team.html"
  status = 200
[[redirects]]
  from = "/testimonials"
  to   = "/pages/testimonials.html"
  status = 200
[[redirects]]
  from = "/faq"
  to   = "/pages/faq.html"
  status = 200
[[redirects]]
  from = "/interested"
  to   = "/pages/interested.html"
  status = 200
[[redirects]]
  from = "/album"
  to   = "/pages/album.html"
  status = 200

# ── Legacy *.html URLs → clean URL (301). Query strings auto-carry.
[[redirects]]
