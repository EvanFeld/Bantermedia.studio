  <!--
    FIX 1 (Critical): Both external scripts load BEFORE the inline script runs.
    Previously photos-data.js loaded after the inline <script>, so cloudUrl()
    and LOCAL_CATEGORIES/LOCAL_ALBUMS were undefined when first used.
  -->
  <script src="script.js"></script>
  <script src="photos-data.js"></script>

  <script>
    (function () {
      document.addEventListener('DOMContentLoaded', function () {

        var CDN_OPTS = 'w_700,q_auto,f_auto';

        // ── Guard against missing LOCAL_ALBUMS ───────────────────────────────
        var filterWrap = document.getElementById('filter-btns');
        var albumsGrid = document.getElementById('albums-grid');

        if (typeof LOCAL_ALBUMS === 'undefined' || !Array.isArray(LOCAL_ALBUMS)) {
          albumsGrid.innerHTML =
            '<p class="load-error" style="padding:32px 24px;color:var(--gray);font-size:0.9rem;">' +
            'Albums could not be loaded. Please refresh the page.' +
            '</p>';
        } else {

          // ── Build filter buttons ──────────────────────────────────────────
          var tags = ['All'].concat(
            LOCAL_ALBUMS
              .map(function (a) { return a.tag; })
              .filter(function (tag, idx, arr) { return arr.indexOf(tag) === idx; })
          );
          var activeTag = 'All';

          // FIX 5 cont.: Build buttons via DOM methods — no inline event handlers,
          // no XSS risk from tag values that contain quotes or script characters.
          tags.forEach(function (tag) {
            var btn = document.createElement('button');
            btn.className = 'filter-btn' + (tag === 'All' ? ' active' : '');
            btn.textContent = tag;
            btn.setAttribute('aria-pressed', tag === 'All' ? 'true' : 'false');
            btn.addEventListener('click', function () { filterAlbums(tag); });
            filterWrap.appendChild(btn);
          });

          // ── Build albums grid ─────────────────────────────────────────────
          function renderAlbums(filtered) {
            // FIX 6 (Improvement): Show a message when the filtered set is empty.
            if (!filtered || filtered.length === 0) {
              albumsGrid.innerHTML =
                '<p style="padding:32px 24px;color:var(--gray);font-size:0.9rem;">' +
                'No albums in this category yet.' +
                '</p>';
              return;
            }

            var countEl = document.getElementById('album-count');
            if (countEl) countEl.textContent = filtered.length + (filtered.length === 1 ? ' Album' : ' Albums');

            // Cap column count so sparse filtered sets don't leave empty right columns
            var maxCols = window.innerWidth <= 540 ? 2 : window.innerWidth <= 900 ? 3 : 4;
            albumsGrid.style.columnCount = Math.min(filtered.length, maxCols);

            albumsGrid.innerHTML = filtered.map(function (album) {
              var coverUrl = cloudUrl(album.cover, CDN_OPTS);
              var safeId   = encodeURIComponent(album.id);
              return (
                '<div class="gig-card dyn-card reveal"' +
                '     role="button" tabindex="0"' +
                '     data-href="event.html?localAlbum=' + safeId + '">' +
                '  <img class="gig-img"' +
                '       src="' + coverUrl + '"' +
                '       alt="' + escAttr(album.title) + '"' +
                '       loading="lazy"' +
                '       onerror="this.onerror=null;this.src=\'assets/placeholder.jpg\';this.alt=\'Image unavailable\';" />' +
                '  <div class="gig-overlay">' +
                '    <p class="gig-tag">' + escHtml(album.tag) + '</p>' +
                '    <p class="gig-name">' + escHtml(album.title.toUpperCase()) + '</p>' +
                '  </div>' +
                '</div>'
              );
            }).join('');

            // FIX 7 (Warning): Guard observer.observe() — observer is defined in
            // script.js, which could fail to load or be renamed. Checking first
            // prevents an uncaught ReferenceError that would break the reveal animation.
            if (typeof observer !== 'undefined' && observer && typeof observer.observe === 'function') {
              albumsGrid.querySelectorAll('.reveal').forEach(function (el) {
                observer.observe(el);
              });
            }

            // FIX 5 cont.: Event delegation for album card clicks.
            albumsGrid.addEventListener('click', function (e) {
              var card = e.target.closest('[data-href]');
              if (card) window.location.href = card.dataset.href;
            });
            albumsGrid.addEventListener('keydown', function (e) {
              if (e.key === 'Enter' || e.key === ' ') {
                var card = e.target.closest('[data-href]');
                if (card) window.location.href = card.dataset.href;
              }
            });
          }

          function filterAlbums(tag) {
            activeTag = tag;
            filterWrap.querySelectorAll('.filter-btn').forEach(function (btn) {
              var isActive = btn.textContent === tag;
              btn.classList.toggle('active', isActive);
              btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
            });
            var filtered = tag === 'All'
              ? LOCAL_ALBUMS
              : LOCAL_ALBUMS.filter(function (a) { return a.tag === tag; });
            renderAlbums(filtered);
          }

          // Pre-select filter from ?tag= URL param (e.g. work.html?tag=EOP+Basketball).
          var urlTag = new URLSearchParams(window.location.search).get('tag');
          if (urlTag) {
            filterAlbums(urlTag);
          } else {
            renderAlbums(LOCAL_ALBUMS);
          }
        }

      }); // end DOMContentLoaded

      // ── Utility helpers ───────────────────────────────────────────────────
      // FIX 5 cont.: Escape user-controlled data before inserting into HTML
      // to prevent XSS when tag/title values contain special characters.
      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      // Lighter version for use inside attribute values that are already quoted.
      function escAttr(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;');
      }

    })(); // end IIFE
  </script>

  <style>
    /* Masonry — images at natural height, pack together like columns */
    #albums-grid {
      display: block;
      columns: 4;
      column-gap: 8px;
    }
    #albums-grid .gig-card {
      break-inside: avoid;
      width: 100%;
      margin-bottom: 8px;
      grid-column: unset !important;
    }
    #albums-grid .gig-img {
      width: 100%;
      height: auto;
      display: block;
      min-height: unset;
      object-fit: unset;
    }
    @media (max-width: 900px) {
      #albums-grid { columns: 3; }
    }
    @media (max-width: 540px) {
      #albums-grid { columns: 2; }
    }

    /* Sticky filter bar */
    .work-filter-bar {
      position: sticky;
      top: 65px;
      z-index: 50;
      background: rgba(244,247,251,0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #filter-btns {
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1 1 auto;
      min-width: 0;
    }
    #filter-btns::-webkit-scrollbar { display: none; }
    .work-count {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray-light);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Editorial tab-strip filter buttons */
    .filter-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 18px 0;
      margin-right: 36px;
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      color: var(--gray-light);
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease;
      border-radius: 0;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-btn:hover {
      color: var(--navy);
    }
    .filter-btn.active {
      color: var(--navy);
      border-bottom-color: var(--blue);
    }
    @media (max-width: 600px) {
      .work-filter-bar { padding: 0 16px; top: 58px; gap: 8px; }
      .filter-btn { margin-right: 14px; font-size: 0.6rem; letter-spacing: 0.08em; padding: 14px 0; }
      .work-count { font-size: 0.58rem; letter-spacing: 0.1em; white-space: nowrap; flex-shrink: 0; }
    }
  </style>

</body>
